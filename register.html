<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AnnSetu</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="register.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-leaf"></i> Ann<span>Setu</span>
            </a>
            <button class="mobile-menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="community.html">About</a></li>
                <li><a href="matching-system.html">How It Works</a></li>
                <li><a href="trust-center.html">Contact</a></li>
                <li><a href="register.html" class="btn-nav login">Login</a></li>
                <li><a href="register.html" class="btn-nav register active">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Registration Section -->
    <section class="register-section pt-100">
        <div class="register-container">
            <div class="register-header">
                <h2>Join Our Mission</h2>
                <p>Choose your role to get started and help us bridge hunger with hope.</p>
            </div>
            
            <div class="role-selector">
                <button type="button" class="role-btn active" data-role="provider">
                    <i class="fa-solid fa-hand-holding-heart"></i>
                    <div>
                        <h3>Food Provider</h3>
                        <p>I want to donate food</p>
                    </div>
                </button>
                <button type="button" class="role-btn" data-role="receiver">
                    <i class="fa-solid fa-bowl-food"></i>
                    <div>
                        <h3>Food Receiver</h3>
                        <p>I need or distribute food</p>
                    </div>
                </button>
            </div>

            <div class="register-form-box">
                <form id="registerForm">
                    <!-- Common Basic Info -->
                    <div class="form-group row">
                        <div class="col-half">
                            <label>Full Name / Organization Name *</label>
                            <div class="input-icon">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" id="regName" placeholder="e.g. John Doe or Fresh Bakers" required>
                            </div>
                        </div>
                        <div class="col-half" id="typeContainer">
                            <!-- Injected by JS based on role -->
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-half">
                            <label>Email Address *</label>
                            <div class="input-action-group">
                                <div class="input-icon">
                                    <i class="fa-regular fa-envelope"></i>
                                    <input type="email" id="regEmail" placeholder="john@example.com" required>
                                </div>
                                <button type="button" class="btn-verify">Verify</button>
                            </div>
                        </div>
                        <div class="col-half">
                            <label>Phone Number *</label>
                            <div class="input-action-group">
                                <div class="input-icon">
                                    <i class="fa-solid fa-phone"></i>
                                    <input type="tel" id="regPhone" placeholder="+91 9876543210" required>
                                </div>
                                <button type="button" class="btn-verify">Send OTP</button>
                            </div>
                        </div>
                    </div>

                    <!-- Dynamic Fields Container -->
                    <div id="dynamicFields" class="form-group row dynamic-fields">
                        <!-- Business license / NGO ID injected here -->
                    </div>

                    <div class="form-group row">
                        <div class="col-half">
                            <label>Create Password *</label>
                            <div class="input-icon">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="regPassword" placeholder="Min. 8 characters" required>
                            </div>
                        </div>
                        <div class="col-half">
                            <label>Confirm Password *</label>
                            <div class="input-icon">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="regConfirmPassword" placeholder="Re-enter your password" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Address / Location *</label>
                        <div class="input-icon">
                            <i class="fa-solid fa-location-dot"></i>
                            <input type="text" id="regAddress" placeholder="123 Street Name, Area, City, Pincode" required>
                        </div>
                    </div>

                    <div class="terms-group">
                        <label class="checkbox-container">
                            <input type="checkbox" required>
                            <span class="checkmark"></span>
                            <span class="terms-text">I agree to the <a href="#">Terms of Service</a>. I acknowledge my responsibility to maintain strict <strong>food safety and hygiene standards</strong> during handover and release AnnSetu from any liability regarding food consumption.</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary submit-btn">Create Account</button>
                    
                    <p class="login-prompt">Already have an account? <a href="register.html">Log In</a></p>
                </form>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="register.js"></script>
</body>
</html>
